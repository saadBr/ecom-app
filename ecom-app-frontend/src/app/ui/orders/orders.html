<div class="container py-4">
  <div class="card shadow-sm border-0 rounded-4">
    <div class="card-header bg-dark text-white rounded-top-4 py-3 d-flex justify-content-between align-items-center">
      <div>
        <h4 class="mb-0">Orders</h4>
        <small class="text-light opacity-75">Manage and view all orders</small>
      </div>
      <span class="badge bg-light text-dark px-3 py-2 fs-6">
        {{ orders?.length || 0 }} Orders
      </span>
    </div>

    <div class="card-body p-4">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-dark">
          <tr>
            <th>ID</th>
            <th>Date</th>
            <th>State</th>
            <th class="text-center">Products Count</th>
            <th class="text-center">Action</th>
          </tr>
          </thead>
          <tbody>
            @for (o of orders; track o.id) {
              <tr>
                <td class="fw-semibold">{{ o.id }}</td>
                <td>{{ o.date }}</td>
                <td>
                  <span class="badge bg-warning text-dark px-3 py-2">
                    {{ o.state }}
                  </span>
                </td>
                <td class="text-center">
                  <span class="badge bg-secondary px-3 py-2">
                    {{ o.items.length }}
                  </span>
                </td>
                <td class="text-center">
                  <button class="btn btn-success btn-sm px-3 rounded-pill" (click)="getOrderDetails(o)">
                    Order Details
                  </button>
                </td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>
